name: Feature request
description: Suggest a new page, section, or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Share your idea for the GDG Aranjuez website. For content-only requests, describe the copy or page you need.

        Please search [existing issues](https://github.com/GDG-Aranjuez/devfest-aranjuez-2026/issues) before opening a new one.

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user need or goal does this address?
      placeholder: Attendees need an easy way to find parking information before the event.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you would like to see. Include links, mockups, or references if you have them.
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Small copy or content update
        - New section on an existing page
        - New page or route
        - Design / UX improvement
        - Developer tooling
    validations:
      required: true

  - type: checkboxes
    id: volunteer
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this

  - type: checkboxes
    id: terms
    attributes:
      label: Code of conduct
      options:
        - label: I agree to follow the [Code of Conduct](../../CODE_OF_CONDUCT.md)
          required: true
